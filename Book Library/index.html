<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Book Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>My Book Library</h1>

      <div class="form-section">
        <input type="text" id="title" placeholder="Book Title" />
        <input type="text" id="author" placeholder="Author Name" />
        <label for="category">Category</label>
        <select id="category" aria-label="Book category">
          <option value="Fiction">Fiction</option>
          <option value="Non-Fiction">Non-Fiction</option>
          <option value="Education">Education</option>
        </select>
        <button onclick="addBook()" id="addBtn">Add Book</button>
      </div>

      <div class="search-section">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by title..."
          onkeyup="filterBooks()"
        />
        <!-- category se bhi filter kar sakte hai ab, pehle sirf search tha -->
        <select id="categoryFilter" aria-label="Filter by category" onchange="filterBooks()">
          <option value="All">All Categories</option>
          <option value="Fiction">Fiction</option>
          <option value="Non-Fiction">Non-Fiction</option>
          <option value="Education">Education</option>
        </select>
      </div>

      <table id="bookTable">
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="bookList"></tbody>
      </table>

      <p id="emptyMsg" class="empty-msg">
        No books added yet. Add your first one above.
      </p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
